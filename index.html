<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koru: The Fight for Eden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; }
        .footer-credit { text-align: center; color: #475569; font-size: 0.8rem; letter-spacing: 0.2rem; margin-bottom: 1rem; }
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { pointer-events: auto; padding: 1rem 3rem; background: #1e1b4b; border: 1px solid #6366f1; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #312e81; }
    </style>
</head>
<body>
    <div id="menu" class="menu-overlay">
        <h1 class="text-6xl font-black mb-4">KORU</h1>
        <button id="start-btn">INITIALIZE MISSION</button>
    </div>

    <div class="ui">
        <div class="flex justify-between">
            <div>
                <h2 id="level-txt" class="text-cyan-400 font-bold">LEVEL 1</h2>
                <div id="score-txt" class="text-3xl font-mono">0 / 20</div>
            </div>
            <div id="timer-txt" class="text-3xl font-mono text-red-400">00:60</div>
        </div>
        <div class="footer-credit">Created By Daniel Martins | VertaScan3D | 2026 Copyright</div>
    </div>
    
    <canvas id="game-canvas"></canvas>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        let player = null, enemies = [], score = 0, level = 1, timer = 60, playing = false;
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        class Player {
            constructor() {
                this.group = new THREE.Group();
                this.mixer = null;
                this.actions = {};
                this.currentAction = null;
                
                // Load koru.glb
                const loader = new THREE.GLTFLoader();
                loader.load('koru.glb', (gltf) => {
                    this.model = gltf.scene;
                    this.model.scale.set(5, 5, 5); // Scale up if tiny
                    this.group.add(this.model);
                    
                    this.mixer = new THREE.AnimationMixer(this.model);
                    gltf.animations.forEach(clip => {
                        this.actions[clip.name.toLowerCase()] = this.mixer.clipAction(clip);
                    });
                    
                    if (this.actions['idle']) {
                        this.currentAction = this.actions['idle'];
                        this.currentAction.play();
                    }
                }, undefined, (err) => console.error("Error loading koru.glb", err));
                
                scene.add(this.group);
            }

            update(dt) {
                const speed = 0.2;
                let moved = false;
                if(keys['w']) { this.group.position.z -= speed; moved = true; }
                if(keys['s']) { this.group.position.z += speed; moved = true; }
                if(keys['a']) { this.group.position.x -= speed; moved = true; }
                if(keys['d']) { this.group.position.x += speed; moved = true; }
                
                camera.position.set(this.group.position.x, this.group.position.y + 10, this.group.position.z + 10);
                camera.lookAt(this.group.position);

                // Animation logic
                if (this.mixer) {
                    const targetName = moved ? 'sneak walk' : 'idle';
                    const nextAction = this.actions[targetName];
                    if (nextAction && this.currentAction !== nextAction) {
                        if (this.currentAction) this.currentAction.fadeOut(0.2);
                        nextAction.reset().fadeIn(0.2).play();
                        this.currentAction = nextAction;
                    }
                    this.mixer.update(dt);
                }
            }
        }

        function initGame() {
            player = new Player();
            playing = true;
            document.getElementById('menu').style.display = 'none';
            animate();
        }

        document.getElementById('start-btn').onclick = initGame;

        function animate() {
            if(!playing) return;
            requestAnimationFrame(animate);
            
            if(player) player.update(0.016);
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
