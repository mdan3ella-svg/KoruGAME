<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koru: The Fight for Eden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; }
        .hud-bar-container { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; width: 250px; height: 12px; margin-top: 0.5rem; }
        .hud-bar { height: 100%; transition: width 0.1s linear; }
        .health-bar { background: linear-gradient(90deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6; }
        .neural-bar { background: linear-gradient(90deg, #a855f7, #c084fc); box-shadow: 0 0 15px #a855f7; }
        
        #start-screen, #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,10,0.9); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        
        .crt-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(50, 0, 255, 0.05), rgba(0, 255, 255, 0.02), rgba(255, 0, 255, 0.05)); background-size: 100% 4px, 4px 100%; opacity: 0.2; }
        
        button { pointer-events: auto; background: linear-gradient(45deg, #1e1b4b, #312e81); border: 2px solid #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); transition: all 0.2s; cursor: pointer; color: white; text-transform: uppercase; letter-spacing: 0.1em; padding: 1rem 2rem; border-radius: 0.5rem; }
        button:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 25px rgba(99, 102, 241, 0.8); }
        
        .char-btn.selected { background: linear-gradient(45deg, #312e81, #4f46e5); border-color: #818cf8; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <div class="crt-overlay"></div>

    <div id="ui-layer" class="hidden">
        <div class="flex justify-between items-start w-full">
            <div>
                <h1 class="text-3xl font-black tracking-[0.2em] text-cyan-400">KORU</h1>
                <div class="mt-4">
                    <div class="text-[10px] text-cyan-200 tracking-widest uppercase">Armor Integrity</div>
                    <div class="hud-bar-container"><div id="health-bar" class="hud-bar health-bar" style="width: 100%;"></div></div>
                </div>
                <div class="mt-4">
                    <div class="text-[10px] text-purple-200 tracking-widest uppercase">Neural Link</div>
                    <div class="hud-bar-container"><div id="neural-bar" class="hud-bar neural-bar" style="width: 100%;"></div></div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-sm text-gray-400 font-mono" id="level-display">SECTOR: SURFACE</div>
                <div class="text-4xl font-bold font-mono mt-1 text-white" id="score-display">0000</div>
                <div class="text-xl font-mono mt-2 text-red-500 font-bold" id="timer-display">TIME: --</div>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1 class="text-7xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 tracking-tighter">KORU</h1>
        <p class="text-gray-400 mb-8 font-mono tracking-widest">CYBERNETIC DEFENSE SYSTEM</p>
        <div class="flex gap-4 mb-8">
            <button id="btn-opt-1" class="char-btn selected">Standard</button>
            <button id="btn-opt-2" class="char-btn" disabled>GLB Mode</button>
        </div>
        <button id="start-btn">Initialize</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 class="text-6xl font-black mb-4" id="end-title">SYSTEM FAILURE</h1>
        <p class="text-2xl mb-8 text-gray-400" id="end-score">Score: 0</p>
        <button id="restart-btn">Reboot</button>
    </div>

    <script>
        const GAME_STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = GAME_STATE.MENU;
        let score = 0, currentLevel = 1, totalKills = 0, timeRemaining = 0, frameCount = 0;
        let selectedCharacter = 1, loadedGLB = null, loadedAnimations = [];

        const LEVELS = [
            { id: 1, name: "I: SECTOR ALPHA", requiredKills: 20, timeLimit: 120, fog: 0x0f0f20, ground: 0x050510 },
            { id: 2, name: "II: HIVE DEPTHS", requiredKills: 40, timeLimit: 120, fog: 0x100520, ground: 0x050010 },
            { id: 3, name: "III: THE CORE", requiredKills: 100, timeLimit: 300, fog: 0x051010, ground: 0x000505 }
        ];

        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.8; // Brighter for reflections
        renderer.outputEncoding = THREE.sRGBEncoding;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x0f0f20, 0.015);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraOffset = new THREE.Vector3(0, 20, 30);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x050505 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        class Pool {
            constructor(factory, size) {
                this.items = Array.from({length: size}, () => factory());
            }
            get() { return this.items.find(i => !i.active); }
            getActive() { return this.items.filter(i => i.active); }
        }

        const projPool = new Pool(() => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            m.visible = false; scene.add(m);
            return { mesh: m, active: false, life: 2.0, velocity: new THREE.Vector3(), isPlayer: true };
        }, 100);

        function fireProjectile(origin, dir, speed, isPlayer) {
            const p = projPool.get();
            if(p) {
                p.active = true; p.mesh.visible = true;
                p.mesh.position.copy(origin);
                p.velocity.copy(dir).multiplyScalar(speed);
                p.isPlayer = isPlayer; p.life = 2.0;
                p.mesh.material.color.setHex(isPlayer ? 0x00ffff : 0xff0000);
            }
        }

        class Player {
            constructor() {
                this.group = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 }));
                this.group.add(b);
                scene.add(this.group);
                this.position = this.group.position;
                this.velocity = new THREE.Vector3();
                this.health = 100; this.maxHealth = 100;
                this.radius = 1.5;
            }
            update(dt) {
                // Movement Logic (Basic WASD)
                if(keys.w) this.velocity.z = -10; else if(keys.s) this.velocity.z = 10; else this.velocity.z = 0;
                if(keys.a) this.velocity.x = -10; else if(keys.d) this.velocity.x = 10; else this.velocity.x = 0;
                this.position.addScaledVector(this.velocity, dt);
                camera.position.lerp(this.position.clone().add(cameraOffset), dt * 5);
                camera.lookAt(this.position);
            }
        }

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        class Enemy {
            constructor() {
                this.group = new THREE.Mesh(new THREE.TetrahedronGeometry(1.2), new THREE.MeshStandardMaterial({ color: 0xff0055, metalness: 0.5 }));
                this.group.visible = false;
                scene.add(this.group);
                this.active = false;
                this.position = this.group.position;
                this.radius = 2.0; // Larger hitbox
            }
            spawn(x, z) {
                this.active = true; this.group.visible = true;
                this.position.set(x, 1, z);
            }
            die() {
                this.active = false; this.group.visible = false;
                score += 100; totalKills++;
                document.getElementById('score-display').innerText = totalKills.toString().padStart(4, '0');
            }
        }

        const enemies = Array.from({length: 40}, () => new Enemy());
        
        function checkWinCondition() {
            if (totalKills >= 100 && currentLevel === 3) endGame("HIVE ELIMINATED - VICTORY");
            else if (totalKills >= LEVELS[currentLevel-1].requiredKills && currentLevel < 3) {
                currentLevel++;
                initLevel(currentLevel);
            }
        }

        function initLevel(lvl) {
            currentLevel = lvl;
            const data = LEVELS[lvl-1];
            timeRemaining = data.timeLimit;
            scene.fog.color.setHex(data.fog);
            scene.background.setHex(data.ground);
            document.getElementById('level-display').innerText = data.name;
        }

        function endGame(msg) {
            currentState = GAME_STATE.GAMEOVER;
            document.getElementById('end-title').innerText = msg;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function animate(time) {
            if(currentState !== GAME_STATE.PLAYING) return;
            requestAnimationFrame(animate);
            
            const dt = 0.016;
            timeRemaining -= dt;
            document.getElementById('timer-display').innerText = `TIME: ${Math.floor(timeRemaining)}`;
            if(timeRemaining <= 0) endGame("SYSTEM FAILURE");

            // Fog Pulsing
            scene.fog.density = 0.01 + Math.sin(time * 0.001) * 0.005;

            // Projectile Physics
            projPool.getActive().forEach(p => {
                p.mesh.position.addScaledVector(p.velocity, dt);
                p.life -= dt;
                if(p.life <= 0) { p.active = false; p.mesh.visible = false; }
                
                if(p.isPlayer) {
                    enemies.forEach(e => {
                        if(e.active && p.mesh.position.distanceTo(e.position) < e.radius + 1) {
                            e.die(); p.active = false; p.mesh.visible = false;
                            checkWinCondition();
                        }
                    });
                }
            });

            // Enemy Spawn
            if(Math.random() < 0.05) {
                const e = enemies.find(en => !en.active);
                if(e) e.spawn((Math.random()-0.5)*100, (Math.random()-0.5)*100);
            }

            player.update(dt);
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            currentState = GAME_STATE.PLAYING;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            player = new Player();
            initLevel(1);
            animate(0);
        });
        
        window.addEventListener('mousedown', () => {
            if(currentState === GAME_STATE.PLAYING) fireProjectile(player.position, new THREE.Vector3(0,0,-1).applyQuaternion(player.group.quaternion), 30, true);
        });
    </script>
</body>
</html>
